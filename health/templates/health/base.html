{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Management System</title>
    <link rel="stylesheet" href="{% static 'health/style.css' %}?v=10">
</head>

<body>
    
    <script>
window.addEventListener("scroll", function () {
    let reveals = document.querySelectorAll(".reveal");

    reveals.forEach(function (el) {
        let windowHeight = window.innerHeight;
        let elementTop = el.getBoundingClientRect().top;
        let elementVisible = 120;

        if (elementTop < windowHeight - elementVisible) {
            el.classList.add("active");
        }
    });
});
</script>


<header class="top-bar">
    <div class="logo">
        <img src="https://tse1.mm.bing.net/th/id/OIP.nJiZxpAXv1RqmQVfqn5QBAHaF7?pid=Api&P=0&h=180">
        <h2 class="tip">Healthcare Management System</h2>
    </div>

    <nav class="menu">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'services' %}">Services</a>
        <a href="{% url 'contact' %}">Contact</a>

        {% if request.session.is_logged_in %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
</header>

{% block content %}
{% endblock %}

</body>
</html>
